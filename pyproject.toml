[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ddns-update-monkey"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "requests~=2.32",
    "python-dotenv~=1.2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pre-commit>=4.0.0",
    "ruff>=0.11.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/monkey"]

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line-length enforced by formatter, not linter
]
